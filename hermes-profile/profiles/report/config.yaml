model:
  default: deepseek-v4-flash
  provider: deepseek
  base_url: https://api.deepseek.com
fallback_providers: []
providers:
  deepseek:
    request_timeout_seconds: 150
    stale_timeout_seconds: 120
telegram:
  enabled: false
agent:
  max_turns: 3
  api_max_retries: 1
  disabled_toolsets:
    - clarify
    - terminal
    - file
    - code_execution
    - computer_use
    - delegation
    - memory
    - messaging
    - cronjob
    - skills
    - session_search
    - todo
    - web
    - browser
    - image_gen
    - vision
    - tts
    - video
    - video_gen
    - discord
    - discord_admin
    - homeassistant
    - spotify
    - yuanbao
platform_toolsets:
  api_server: []
memory:
  memory_enabled: false
  user_profile_enabled: false
