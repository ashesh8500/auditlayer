<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in to AuditLayer</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f8fafc;
      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        'Segoe UI',
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
      color: #0f172a;
      line-height: 1.5;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background: #f8fafc; padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 480px;
              background: #ffffff;
              border: 1px solid #e2e8f0;
              border-radius: 12px;
              box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            "
          >
            <tr>
              <td style="padding: 32px 32px 8px">
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td
                      style="
                        width: 32px;
                        height: 32px;
                        border-radius: 8px;
                        background: #0d9488;
                        color: #ffffff;
                        font-family:
                          'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo,
                          Monaco, Consolas, monospace;
                        font-size: 12px;
                        font-weight: 700;
                        text-align: center;
                        vertical-align: middle;
                      "
                    >
                      AL
                    </td>
                    <td style="padding-left: 10px; font-size: 15px; font-weight: 700">
                      AuditLayer
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding: 8px 32px 0">
                <h1
                  style="
                    margin: 0 0 8px;
                    font-size: 22px;
                    font-weight: 700;
                    letter-spacing: -0.02em;
                  "
                >
                  Your secure sign-in link
                </h1>
                <p style="margin: 0; font-size: 14px; color: #64748b">
                  Tap the button below to open your AuditLayer account. This link
                  expires in one hour and works once.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 24px 32px 8px">
                <a
                  href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=email"
                  style="
                    display: inline-block;
                    background: #0d9488;
                    color: #ffffff;
                    text-decoration: none;
                    font-size: 14px;
                    font-weight: 600;
                    padding: 12px 20px;
                    border-radius: 8px;
                  "
                  >Sign in to AuditLayer</a
                >
              </td>
            </tr>
            <tr>
              <td style="padding: 8px 32px 24px">
                <p style="margin: 0; font-size: 12px; color: #94a3b8">
                  If you did not request this email, you can ignore it.
                </p>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 16px 32px 28px;
                  border-top: 1px solid #f1f5f9;
                  font-size: 11px;
                  color: #94a3b8;
                "
              >
                AuditLayer — evidence-based social media audits for creators.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
