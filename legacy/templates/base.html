<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AuditLayer{% endblock %}</title>
  <style>
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --ink: #1c1917;
      --muted: #57534e;
      --line: #e7e5e4;
      --teal: #0d9488;
      --amber: #b45309;
      --red: #b91c1c;
      --green: #15803d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--ink); }
    header { border-bottom: 1px solid var(--line); background: rgba(255,255,255,.9); }
    nav, main { max-width: 1180px; margin: 0 auto; padding: 18px 24px; }
    nav { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    a { color: var(--teal); text-decoration: none; font-weight: 650; }
    h1 { font-size: 34px; margin: 10px 0; letter-spacing: 0; }
    h2 { margin-top: 0; letter-spacing: 0; }
    p { color: var(--muted); line-height: 1.55; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .panel, .metric, .audit, .client { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
    .metric strong { display: block; font-family: "JetBrains Mono", monospace; font-size: 28px; margin-top: 4px; }
    label { display: block; font-weight: 700; margin-top: 14px; }
    input, select, textarea { width: 100%; border: 1px solid #d6d3d1; border-radius: 8px; padding: 11px 12px; font: inherit; margin-top: 6px; background: white; }
    textarea { min-height: 112px; resize: vertical; }
    button, .button { display: inline-flex; align-items: center; justify-content: center; border: 0; border-radius: 8px; background: var(--teal); color: white; padding: 11px 14px; font: inherit; font-weight: 750; cursor: pointer; }
    .button.secondary, button.secondary { background: #44403c; }
    .stack { display: grid; gap: 14px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .badge { display: inline-flex; border-radius: 999px; padding: 4px 9px; font-size: 12px; font-weight: 800; background: #f5f5f4; color: var(--muted); }
    .queued, .running { color: var(--amber); }
    .ready { color: var(--green); }
    .failed, .blocked { color: var(--red); }
    .needs_review { color: var(--amber); }
    .small { font-size: 13px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; border-bottom: 1px solid var(--line); padding: 10px 8px; vertical-align: top; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">AuditLayer</a>
      <div class="row">
        <span class="badge">generator: {{ generator }}</span>
        <a href="/dashboard">Client Dashboard</a>
        <a href="/login">Login</a>
        <a href="/admin">Founder Admin</a>
      </div>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
